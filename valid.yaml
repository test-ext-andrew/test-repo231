name: GitHub linked workflow test234 iteration 2
steps:
  - name: trigger
    type: TRIGGER
    next:
      - step: parse

  - name: parse
    type: PARSE
    next:
      - step: extract

  - name: extract
    type: EXTRACT
    config:
      extractor:
        id: ex_lTPabqiQmDXXFQFPgFpcZ
        version: draft
    next:
      - step: validation

  - name: validation
    type: RULE_VALIDATION
    config:
      rules:
        - name: has_required_output
          formula: output.extract != null
    next:
      - result: pass
        step: response
      - result: fail
        step: review

  - name: review
    type: HUMAN_REVIEW
    next:
      - step: response

  - name: response
    type: WEBHOOK_RESPONSE